services:
  llama-gemma:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: song-ai-llama-gemma
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--model"
      - "/models/llm/gemma/gemma.gguf"
      - "--ctx-size"
      - "${SONG_AI_LLAMA_CPP_CTX_SIZE:-4096}"
    ports:
      - "8081:8080"
    volumes:
      - song_ai_models:/models

  llama-qwen:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: song-ai-llama-qwen
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--model"
      - "/models/llm/qwen/qwen.gguf"
      - "--ctx-size"
      - "${SONG_AI_LLAMA_CPP_CTX_SIZE:-4096}"
    ports:
      - "8082:8080"
    volumes:
      - song_ai_models:/models
