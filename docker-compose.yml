services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: song-ai-app
    ports:
      - "8000:8000"
    environment:
      SONG_AI_LLAMA_CPP_ENABLED: ${SONG_AI_LLAMA_CPP_ENABLED:-false}
      SONG_AI_LLAMA_CPP_BASE_URL: ${SONG_AI_LLAMA_CPP_BASE_URL:-http://host.docker.internal:8080}
      SONG_AI_LLAMA_CPP_TIMEOUT_SECONDS: ${SONG_AI_LLAMA_CPP_TIMEOUT_SECONDS:-45}
      SONG_AI_LLAMA_CPP_N_PREDICT: ${SONG_AI_LLAMA_CPP_N_PREDICT:-512}
      SONG_AI_LLAMA_CPP_TEMPERATURE: ${SONG_AI_LLAMA_CPP_TEMPERATURE:-0.35}
      SONG_AI_INTERPRETER_MODEL: ${SONG_AI_INTERPRETER_MODEL:-Gemma 4 E4B IT GGUF}
      SONG_AI_LYRICS_MODEL: ${SONG_AI_LYRICS_MODEL:-Gemma 4 E4B IT GGUF}
      SONG_AI_TECHNICAL_MODEL: ${SONG_AI_TECHNICAL_MODEL:-Qwen3 4B GGUF}
      SONG_AI_BOOTSTRAP_ON_START: ${SONG_AI_BOOTSTRAP_ON_START:-true}
      SONG_AI_INSTALL_LOCAL_AUDIO_DEPS: ${SONG_AI_INSTALL_LOCAL_AUDIO_DEPS:-true}
      SONG_AI_INSTALL_ACE_STEP: ${SONG_AI_INSTALL_ACE_STEP:-true}
      SONG_AI_BOOTSTRAP_UPGRADE: ${SONG_AI_BOOTSTRAP_UPGRADE:-false}
      SONG_AI_ACE_STEP_PACKAGE: ${SONG_AI_ACE_STEP_PACKAGE:-git+https://github.com/ace-step/ACE-Step.git}
      SONG_AI_DOWNLOAD_MUSICGEN: ${SONG_AI_DOWNLOAD_MUSICGEN:-false}
      SONG_AI_MUSICGEN_MODEL_ID: ${SONG_AI_MUSICGEN_MODEL_ID:-facebook/musicgen-small}
      SONG_AI_HF_MODEL_IDS: ${SONG_AI_HF_MODEL_IDS:-}
      SONG_AI_GEMMA_GGUF_URL: ${SONG_AI_GEMMA_GGUF_URL:-}
      SONG_AI_QWEN_GGUF_URL: ${SONG_AI_QWEN_GGUF_URL:-}
      SONG_AI_VOICE_MODEL_URL: ${SONG_AI_VOICE_MODEL_URL:-}
      SONG_AI_PROVIDER_REPOS: ${SONG_AI_PROVIDER_REPOS:-}
      SONG_AI_FULL_SONG_COMMAND: ${SONG_AI_FULL_SONG_COMMAND:-python tools/acestep_generate.py --prompt {prompt_path} --lyrics {lyrics_path} --output {output_path} --checkpoint-path /app/models/music/ace-step --duration 60 --cpu-offload true --overlapped-decode true}
      SONG_AI_SOUNDTRACK_COMMAND: ${SONG_AI_SOUNDTRACK_COMMAND:-}
      SONG_AI_SINGING_VOICE_COMMAND: ${SONG_AI_SINGING_VOICE_COMMAND:-}
    volumes:
      - song_ai_data:/app/data
      - song_ai_models:/app/models
      - song_ai_providers:/app/providers
      - song_ai_provider_cache:/app/provider-cache

volumes:
  song_ai_data:
  song_ai_models:
  song_ai_providers:
  song_ai_provider_cache:
